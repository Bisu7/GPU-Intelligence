version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gpu_intel_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gpu_intel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gpu_intel_redis
    restart: always
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    container_name: gpu_intel_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/gpu_intel
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-for-jwt
      - USE_SIMULATOR=true
      - BACKEND_CORS_ORIGINS=["http://localhost:3001","http://127.0.0.1:3001","http://localhost:3000"]
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: gpu_intel_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend

volumes:
  postgres_data:
